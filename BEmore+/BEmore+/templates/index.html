<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BEmore+</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#212121;
            color:white;
            height:100vh;
            display:flex;
        }

        /* SIDEBAR */

        .sidebar{
            width:240px;
            background:#171717;
            border-right:1px solid #2f2f2f;
            padding:20px;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            color:#10a37f;
        }

        /* MAIN */

        .main{
            flex:1;
            display:flex;
            flex-direction:column;
        }

        /* TOPO */

        .topo{
            padding:20px;
            border-bottom:1px solid #2f2f2f;
            text-align:center;
        }

        .topo h1{
            font-size:28px;
        }

        /* CHAT */

        .chat{
            flex:1;
            overflow-y:auto;
            padding:30px;
            display:flex;
            flex-direction:column;
            gap:20px;
        }

        .mensagem{
            max-width:70%;
            padding:18px;
            border-radius:18px;
            line-height:1.7;
            word-wrap:break-word;
        }

        .usuario{
            background:#10a37f;
            align-self:flex-end;
        }

        .ia{
            background:#2b2b2b;
            border:1px solid #3b3b3b;
            align-self:flex-start;
        }

        /* INPUT */

        .area-input{
            padding:20px;
            border-top:1px solid #2f2f2f;
            background:#212121;
        }

        form{
            display:flex;
            gap:15px;
        }

        input{
            flex:1;
            padding:18px;
            border:none;
            border-radius:15px;
            background:#2b2b2b;
            color:white;
            font-size:15px;
            outline:none;
        }

        input:focus{
            border:1px solid #10a37f;
        }

        button{
            background:#10a37f;
            border:none;
            color:white;
            padding:18px 24px;
            border-radius:15px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0d8c6d;
        }

        /* RESPONSIVO */

        @media(max-width:800px){

            .sidebar{
                display:none;
            }

            .mensagem{
                max-width:90%;
            }

            .chat{
                padding:20px;
            }

        }

    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">
            BEmore+
        </div>

    </div>

    <!-- MAIN -->

    <div class="main">

        <!-- TOPO -->

        <div class="topo">

            <h1>BEmore+</h1>

        </div>

        <!-- CHAT -->

        <div class="chat">

            <div class="mensagem ia">
                Olá! Eu sou a BEmore+, sua assistente virtual de saúde e bem-estar.
            </div>

            <!-- HISTÓRICO -->

            {% for conversa in historico %}

            <div class="mensagem usuario">
                {{ conversa.pergunta }}
            </div>

            <div class="mensagem ia">
                {{ conversa.resposta }}
            </div>

            {% endfor %}

        </div>

        <!-- INPUT -->

        <div class="area-input">

            <form method="POST" autocomplete="off">

                <input
                    type="text"
                    name="pergunta"
                    placeholder="Digite sua mensagem..."
                    autocomplete="off"
                    required
                >

                <button type="submit">
                    Enviar
                </button>

            </form>

        </div>

    </div>

</body>

</html>
